[package]
name = "sift"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
candle-core = "0.9.2"
candle-nn = "0.9.2"
candle-transformers = "0.9.2"
clap = { version = "4.5.60", features = ["derive"] }
flate2 = "1.1.9"
html2text = "0.15.3"
rust_tokenizers = { version = "8.1.1", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sysinfo = "0.38.3"
ureq = "3.2.0"
walkdir = "2.5.0"

[dev-dependencies]
tempfile = "3.26.0"

[features]
